name: CI

on:
  push:
    branches: [main, master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-x86_64:
    name: Build Linux x86_64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux x86_64 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: auto
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-x86_64
          path: dist/*

  linux-aarch64:
    name: Build Linux aarch64 wheels
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux aarch64 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: auto
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-aarch64
          path: dist/*

  musllinux-x86_64:
    name: Build musllinux x86_64 wheels
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build musllinux x86_64 wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: musllinux_1_2
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13

      - uses: actions/upload-artifact@v4
        with:
          name: dist-musllinux-x86_64
          path: dist/*

  windows:
    name: Build Windows wheels
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: ${{ matrix.python_arch }}

      - name: Build Windows wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          args: --release --out dist --interpreter 3.13

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows-${{ matrix.target }}
          path: dist/*

  macos:
    name: Build macOS wheels
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          args: --release --out dist --interpreter 3.10 3.11 3.12 3.13

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos-${{ matrix.target }}
          path: dist/*

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*
          
  release-github:
    name: Upload everything to GitHub Releases
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux-x86_64
      - linux-aarch64
      - musllinux-x86_64
      - windows
      - macos
      - sdist
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-dist
          merge-multiple: true

      - name: Show files
        run: ls -lah release-dist

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-dist/*
          generate_release_notes: true

  release-pypi:
    name: Publish PyPI dists only
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - linux-x86_64
      - linux-aarch64
      - musllinux-x86_64
      - windows
      - macos
      - sdist
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Keep only PyPI-valid pypetmux distributions
        shell: bash
        run: |
          shopt -s nullglob

          for f in dist/*; do
            base="$(basename "$f")"
            case "$base" in
              pypetmux-*.whl|pypetmux-*.tar.gz) ;;
              *) rm -f "$f" ;;
            esac
          done

          for f in dist/pypetmux-*.whl; do
            base="$(basename "$f")"
            if [[ "$base" == *-linux_* ]] && [[ "$base" != *manylinux* ]] && [[ "$base" != *musllinux* ]]; then
              echo "Removing non-PyPI wheel: $base"
              rm -f "$f"
            fi
          done

          ls -lah dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true